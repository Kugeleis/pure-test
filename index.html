<!DOCTYPE html>
<html lang="de" class="sl-theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faceted Search - No NPM</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

</head>
<body>

<header>
    <a href="#" class="logo">ShopName</a>
    <nav class="nav-links">
        <sl-button variant="text">Home</sl-button>
        <sl-button variant="text">Produkte</sl-button>
        <sl-button variant="text">Über uns</sl-button>
        <sl-button variant="primary" outline>Kontakt</sl-button>
    </nav>
</header>

<div class="container">
    <aside id="filters-container">
        <h2>Filter</h2>
        <sl-input id="search-input" label="Suche" placeholder="Name eingeben..." clearable style="margin-bottom: 24px;"></sl-input>
        <div id="dynamic-filters"></div>
    </aside>

    <main>
        <div id="results-info" style="margin-bottom: 10px; font-weight: bold;"></div>
        <div id="item-grid" class="grid"></div>
    </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
